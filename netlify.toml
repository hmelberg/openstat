# The Python translator runner lives only at /py2m/. The old duplicate under
# /r2m/ was deleted (it shipped a stale copy of the whole py2m package); keep the
# URL working for any external bookmark.
[[redirects]]
  from = "/r2m/py2m_runner.html"
  to = "/py2m/py2m_runner.html"
  status = 301

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.py"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/variable_metadata.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/widgets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/command_help.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[edge_functions]]
  function = "dm-vurder"
  path = "/api/dm-vurder"

[[edge_functions]]
  function = "kode-svar"
  path = "/api/kode-svar"

[[edge_functions]]
  function = "kode-svar-v2"
  path = "/api/kode-svar-v2"

[[edge_functions]]
  function = "tolk-resultat"
  path = "/api/tolk-resultat"

[[edge_functions]]
  function = "hent"
  path = "/api/hent"

[[edge_functions]]
  function = "data-svar"
  path = "/api/data-svar"
