name: edge function tests

on:
  push:
    paths:
      - 'netlify/edge-functions/**'
      - '.github/workflows/edge-tests.yml'
  pull_request:
    paths:
      - 'netlify/edge-functions/**'
      - '.github/workflows/edge-tests.yml'

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check edge functions
        working-directory: netlify/edge-functions
        run: deno check *.ts _lib/*.ts
      - name: Run edge-function unit tests
        working-directory: netlify/edge-functions
        run: deno test --allow-all _lib/
